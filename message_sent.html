<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Message Sent - Bladder AI Diagnosis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background-color: #f8f9fa">
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}"
          >Bladder AI Diagnosis</a
        >
      </div>
    </nav>

    <!-- ================= SUCCESS SECTION ================= -->
    <section class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card shadow-lg p-5 text-center">
            <div class="alert alert-success">
              <h2>✅ Message Sent Successfully!</h2>
              <p class="mt-3">
                Thank you <strong>{{ name }}</strong> for contacting us.
              </p>
              <p>We will get back to you soon.</p>
            </div>

            <div class="mt-4">
              <a
                href="{{ url_for('home') }}"
                class="btn btn-primary btn-lg me-2"
              >
                Back to Home
              </a>

              <a
                href="{{ url_for('contact') }}"
                class="btn btn-outline-secondary btn-lg"
              >
                Send Another Message
              </a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-dark text-white text-center py-3">
      <p>© 2026 AI-Based Cystitis vs Bladder Cancer Detection System</p>
      <p>
        <small
          >This system is for educational and research purposes only.</small
        >
      </p>
    </footer>
  </body>
</html>
