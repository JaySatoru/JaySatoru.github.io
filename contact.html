<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact - Bladder AI Diagnosis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body style="background-color: #f8f9fa">
    <!-- ================= NAVBAR ================= -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}"
          >Bladder AI Diagnosis</a
        >

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('about') }}">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('model_page') }}">Model</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('predict_page') }}"
                >Predict</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="{{ url_for('contact') }}"
                >Contact</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ================= HEADER ================= -->
    <section class="bg-primary text-white text-center py-5">
      <div class="container">
        <h1>Contact Us</h1>
        <p class="lead">Get in touch for queries, feedback, or collaboration</p>
      </div>
    </section>

    <!-- ================= CONTACT FORM ================= -->
    <section class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-lg p-4">
            <h3 class="text-center mb-4">Send a Message</h3>

            <form action="/send_message" method="POST">
              <!-- Name -->
              <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" name="name" required />
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  required
                />
              </div>

              <!-- Message -->
              <div class="mb-4">
                <label class="form-label">Message</label>
                <textarea
                  class="form-control"
                  name="message"
                  rows="5"
                  required
                ></textarea>
              </div>

              <!-- Submit Button -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                  Send Message
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= FOOTER ================= -->
    <footer class="bg-dark text-white text-center py-3">
      <p>© 2026 AI-Based Cystitis vs Bladder Cancer Detection System</p>
      <p><small>B.Tech Final Year Project | Educational Purpose Only</small></p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
